# Tags Registry
# 统一标签字典，防止标签混乱
# 最后更新：2026-03-19

tag_groups:

  # ==================== TASK TAGS ====================
  task:
    - tag: coding
      group: task
      meaning: 与代码生成、修改、重构相关的任务
      when_to_apply: |
        - 用户要求生成代码时
        - 需要修改现有代码时
        - 需要代码审查或重构时
      when_not_to_apply: |
        - 非编程任务
        - 只需要分析不需要生成代码时
      related_tags: [debugging, repo-analysis]

    - tag: debugging
      group: task
      meaning: 与 bug 调查、错误分析、问题修复相关的任务
      when_to_apply: |
        - 出现错误信息或异常时
        - 代码行为不符合预期时
        - 需要找出问题根本原因时
      when_not_to_apply: |
        - 正常运行无报错时
        - 只需要生成新代码时
      related_tags: [coding, repo-analysis, verification]

    - tag: repo-analysis
      group: task
      meaning: 与代码库理解、结构分析、文件定位相关的任务
      when_to_apply: |
        - 需要了解项目结构时
        - 接手新项目时
        - 需要定位特定代码时
      when_not_to_apply: |
        - 只需要生成代码时
        - 问题已定位只需修复时
      related_tags: [coding, debugging]

    - tag: planning
      group: task
      meaning: 与任务分解、计划制定、执行规划相关的任务
      when_to_apply: |
        - 任务太复杂需要拆解时
        - 需要制定执行计划时
        - 需要估算工作量时
      when_not_to_apply: |
        - 任务已经很简单
        - 只需要一步操作时
      related_tags: [task-decomposition, execution-plan]

    - tag: research
      group: task
      meaning: 与信息收集、主题研究、方案评估相关的任务
      when_to_apply: |
        - 需要调研某个主题时
        - 需要对比多个方案时
        - 需要了解新领域时
      when_not_to_apply: |
        - 已经有明确答案时
        - 只需要简单查询时
      related_tags: [analysis, evaluation]

    - tag: writing
      group: task
      meaning: 与文章撰写、内容创作、文档生成相关的任务
      when_to_apply: |
        - 需要生成文章或内容时
        - 需要撰写文档时
        - 需要头脑风暴整理思路时
      when_not_to_apply: |
        - 非写作任务
        - 只需要技术实现时
      related_tags: [documentation, content-generation]

  # ==================== DOMAIN TAGS ====================
  domain:
    - tag: web-development
      group: domain
      meaning: Web 开发领域相关
      when_to_apply: |
        - 前端、后端、API 开发任务
        - HTML/CSS/JS 相关
        - Web 服务相关
      when_not_to_apply: |
        - 桌面应用
        - 嵌入式开发
      related_tags: [backend, frontend, api]

    - tag: backend
      group: domain
      meaning: 后端开发相关
      when_to_apply: |
        - 服务器端逻辑
        - 数据库操作
        - API 开发
      when_not_to_apply: |
        - 前端开发
        - 纯数据科学
      related_tags: [web-development, database, api]

    - tag: algorithm
      group: domain
      meaning: 算法和数据结构相关
      when_to_apply: |
        - 需要实现算法时
        - 性能优化相关
        - 数据结构设计
      when_not_to_apply: |
        - 简单 CRUD 操作
        - 纯界面开发
      related_tags: [performance, optimization]

    - tag: database
      group: domain
      meaning: 数据库相关
      when_to_apply: |
        - SQL 查询
        - 数据库设计
        - ORM 操作
      when_not_to_apply: |
        - 不涉及数据存储的任务
      related_tags: [backend]

  # ==================== ASSET TAGS ====================
  asset:
    - tag: prompt
      group: asset
      meaning: Prompt 资源本身
      when_to_apply: |
        - 标识 Prompt 类型的资源
        - Prompt 相关元数据
      when_not_to_apply: |
        - Skill、Workflow 资源
        - 非 Prompt 内容
      related_tags: [skill, workflow, tool-use]

    - tag: skill
      group: asset
      meaning: Skill 技能模块
      when_to_apply: |
        - 标识 Skill 类型的资源
        - 独立可部署的技能单元
      when_not_to_apply: |
        - Prompt 资源
        - Workflow 资源
      related_tags: [prompt, workflow]

    - tag: workflow
      group: asset
      meaning: Workflow 工作流
      when_to_apply: |
        - 标识多步骤工作流
        - 需要组合多个 prompts 或 skills 的场景
      when_not_to_apply: |
        - 单步骤任务
        - 简单问答
      related_tags: [prompt, skill, multi-step]

    - tag: tool-use
      group: asset
      meaning: 工具使用指南
      when_to_apply: |
        - 涉及文件读取、命令执行等工具操作时
        - 需要系统性使用工具的场景
      when_not_to_apply: |
        - 不需要工具辅助
        - 纯推理任务
      related_tags: [prompt, prerequisite]

    - tag: output
      group: asset
      meaning: 输出格式控制
      when_to_apply: |
        - 需要特定输出格式时
        - 格式化输出结果
      when_not_to_apply: |
        - 自由格式输出
        - 简单回答
      related_tags: [format, formatting]

    - tag: meta
      group: asset
      meaning: Prompt 工程元级工具
      when_to_apply: |
        - Prompt 优化、调试、评估时
        - Prompt 本身需要改进时
      when_not_to_apply: |
        - 执行实际任务时
        - Prompt 已经工作良好
      related_tags: [prompt, optimization]

    - tag: routing
      group: asset
      meaning: 路由和选择机制
      when_to_apply: |
        - 需要判断任务类型时
        - 需要选择合适资源时
        - 仓库初始化扫描
      when_not_to_apply: |
        - 任务类型已确定
        - 只需要执行特定 prompt
      related_tags: [prompt, skill, selection]

  # ==================== EXECUTION TAGS ====================
  execution:
    - tag: multi-step
      group: execution
      meaning: 多步骤执行
      when_to_apply: |
        - 任务需要多个步骤时
        - 步骤之间有依赖关系时
        - 需要阶段性验证时
      when_not_to_apply: |
        - 单步骤任务
        - 简单问答
      related_tags: [workflow, sequential]

    - tag: sequential
      group: execution
      meaning: 顺序执行
      when_to_apply: |
        - 步骤必须按顺序执行
        - 前一步输出影响后一步
      when_not_to_apply: |
        - 步骤可以并行
        - 无依赖关系
      related_tags: [multi-step, step-by-step]

    - tag: iterative
      group: execution
      meaning: 迭代执行
      when_to_apply: |
        - 需要反复验证和调整时
        - 迭代改进的场景
      when_not_to_apply: |
        - 一次性任务
        - 无需反馈循环
      related_tags: [multi-step, verification]

    - tag: verification
      group: execution
      meaning: 验证环节
      when_to_apply: |
        - 需要确认结果正确时
        - 修复后验证
        - 质量检查
      when_not_to_apply: |
        - 无需验证的简单任务
        - 纯生成任务
      related_tags: [verification, testing]

    - tag: prerequisite
      group: execution
      meaning: 前置条件检查
      when_to_apply: |
        - 行动前需要准备时
        - 需要先了解上下文时
        - 工具使用前检查
      when_not_to_apply: |
        - 无前置条件
        - 直接执行
      related_tags: [tool-use, preparation]

  # ==================== OUTPUT TAGS ====================
  output:
    - tag: markdown
      group: output
      meaning: Markdown 格式输出
      when_to_apply: |
        - 需要生成文档时
        - 人类可读的报告
        - 结构化文本
      when_not_to_apply: |
        - 需要机器可读格式
        - 需要结构化数据
      related_tags: [document, report]

    - tag: json
      group: output
      meaning: JSON 格式输出
      when_to_apply: |
        - 需要结构化数据时
        - API 响应
        - 数据交换格式
      when_not_to_apply: |
        - 只需要人类可读文档
        - 配置类内容
      related_tags: [structured-data, api]

    - tag: yaml
      group: output
      meaning: YAML 格式输出
      when_to_apply: |
        - 配置文件
        - 人类可读的配置
        - 数据序列化
      when_not_to_apply: |
        - 需要结构化数据
        - 只需要报告
      related_tags: [config, structured-data]

    - tag: table
      group: output
      meaning: 表格格式输出
      when_to_apply: |
        - 对比多个选项
        - 展示并列数据
      when_not_to_apply: |
        - 简单列表
        - 层次结构
      related_tags: [comparison, structured]

    - tag: checklist
      group: output
      meaning: 检查清单格式
      when_to_apply: |
        - 任务分解
        - 验证清单
        - 待办事项
      when_not_to_apply: |
        - 需要详细说明
        - 只需简单列表
      related_tags: [todo, task-decomposition]

    - tag: report
      group: output
      meaning: 报告类输出
      when_to_apply: |
        - 分析结果呈现
        - 研究总结
        - 项目报告
      when_not_to_apply: |
        - 简单回答
        - 代码片段
      related_tags: [markdown, document]

    - tag: structured-data
      group: output
      meaning: 结构化数据
      when_to_apply: |
        - 需要程序处理
        - API 数据格式
      when_not_to_apply: |
        - 只需要人类可读
      related_tags: [json, yaml]

  # ==================== QUALITY TAGS ====================
  quality:
    - tag: optimization
      group: quality
      meaning: 优化相关
      when_to_apply: |
        - 性能优化
        - 代码优化
        - Prompt 压缩
      when_not_to_apply: |
        - 功能实现
        - 新代码生成
      related_tags: [performance, efficiency]

    - tag: review
      group: quality
      meaning: 审查相关
      when_to_apply: |
        - 代码审查
        - 质量评估
        - 代码质量检查
      when_not_to_apply: |
        - 新代码生成
        - 问题修复
      related_tags: [quality, verification]

    - tag: safe
      group: quality
      meaning: 安全相关
      when_to_apply: |
        - 涉及修改的修复
        - 需要确保安全的操作
        - 风险评估
      when_not_to_apply: |
        - 纯生成任务
        - 只读操作
      related_tags: [verification, risk-assessment]

# ==================== 待补全项 ====================
pending_items:
  - |
    当前标签体系覆盖了核心场景：coding, debugging, repo-analysis, planning, research, workflow, tool-use, output
    以下标签领域可以按需扩展：
    - 更多 domain 标签（mobile, desktop, devops, data-science 等）
    - 更多 execution 标签（parallel, conditional 等）
  - |
    当前未涵盖但未来可能需要的标签：
    - 语言相关标签（python, javascript, go 等）
    - 框架相关标签（react, vue, django 等）
