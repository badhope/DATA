# Tags Registry
# 统一标签字典，防止标签混乱
# 最后更新：2026-03-19

tag_groups:

  # ==================== TASK TAGS ====================
  task:
    - tag: coding
      group: task
      meaning: 与代码生成、修改、重构相关的任务
      when_to_apply: |
        - 用户要求生成代码时
        - 需要修改现有代码时
        - 需要代码审查或重构时
      when_not_to_apply: |
        - 非编程任务
        - 只需要分析不需要生成代码时
      related_tags: [debugging, repo-analysis]

    - tag: debugging
      group: task
      meaning: 与 bug 调查、错误分析、问题修复相关的任务
      when_to_apply: |
        - 出现错误信息或异常时
        - 代码行为不符合预期时
        - 需要找出问题根本原因时
      when_not_to_apply: |
        - 正常运行无报错时
        - 只需要生成新代码时
      related_tags: [coding, repo-analysis, verification]

    - tag: repo-analysis
      group: task
      meaning: 与代码库理解、结构分析、文件定位相关的任务
      when_to_apply: |
        - 需要了解项目结构时
        - 接手新项目时
        - 需要定位特定代码时
      when_not_to_apply: |
        - 只需要生成代码时
        - 问题已定位只需修复时
      related_tags: [coding, debugging]

    - tag: planning
      group: task
      meaning: 与任务分解、计划制定、执行规划相关的任务
      when_to_apply: |
        - 任务太复杂需要拆解时
        - 需要制定执行计划时
        - 需要估算工作量时
      when_not_to_apply: |
        - 任务已经很简单
        - 只需要一步操作时
      related_tags: [task-decomposition, execution-plan]

    - tag: research
      group: task
      meaning: 与信息收集、主题研究、方案评估相关的任务
      when_to_apply: |
        - 需要调研某个主题时
        - 需要对比多个方案时
        - 需要了解新领域时
      when_not_to_apply: |
        - 已经有明确答案时
        - 只需要简单查询时
      related_tags: [analysis, evaluation]

    - tag: writing
      group: task
      meaning: 与文章撰写、内容创作、文档生成相关的任务
      when_to_apply: |
        - 需要生成文章或内容时
        - 需要撰写文档时
        - 需要头脑风暴整理思路时
      when_not_to_apply: |
        - 非写作任务
        - 只需要技术实现时
      related_tags: [documentation, content-generation]

  # ==================== DOMAIN TAGS ====================
  domain:
    - tag: web-development
      group: domain
      meaning: Web 开发领域相关
      when_to_apply: |
        - 前端、后端、API 开发任务
        - HTML/CSS/JS 相关
        - Web 服务相关
      when_not_to_apply: |
        - 桌面应用
        - 嵌入式开发
      related_tags: [backend, frontend, api]

    - tag: backend
      group: domain
      meaning: 后端开发相关
      when_to_apply: |
        - 服务器端逻辑
        - 数据库操作
        - API 开发
      when_not_to_apply: |
        - 前端开发
        - 纯数据科学
      related_tags: [web-development, database, api]

    - tag: algorithm
      group: domain
      meaning: 算法和数据结构相关
      when_to_apply: |
        - 需要实现算法时
        - 性能优化相关
        - 数据结构设计
      when_not_to_apply: |
        - 简单 CRUD 操作
        - 纯界面开发
      related_tags: [performance, optimization]

    - tag: database
      group: domain
      meaning: 数据库相关
      when_to_apply: |
        - SQL 查询
        - 数据库设计
        - ORM 操作
      when_not_to_apply: |
        - 不涉及数据存储的任务
      related_tags: [backend]

  # ==================== ASSET TAGS ====================
  asset:
    - tag: prompt
      group: asset
      meaning: Prompt 资源本身
      when_to_apply: |
        - 标识 Prompt 类型的资源
        - Prompt 相关元数据
      when_not_to_apply: |
        - Skill、Workflow 资源
        - 非 Prompt 内容
      related_tags: [skill, workflow, tool-use]

    - tag: skill
      group: asset
      meaning: Skill 技能模块
      when_to_apply: |
        - 标识 Skill 类型的资源
        - 独立可部署的技能单元
      when_not_to_apply: |
        - Prompt 资源
        - Workflow 资源
      related_tags: [prompt, workflow]

    - tag: workflow
      group: asset
      meaning: Workflow 工作流
      when_to_apply: |
        - 标识多步骤工作流
        - 需要组合多个 prompts 或 skills 的场景
      when_not_to_apply: |
        - 单步骤任务
        - 简单问答
      related_tags: [prompt, skill, multi-step]

    - tag: tool-use
      group: asset
      meaning: 工具使用指南
      when_to_apply: |
        - 涉及文件读取、命令执行等工具操作时
        - 需要系统性使用工具的场景
      when_not_to_apply: |
        - 不需要工具辅助
        - 纯推理任务
      related_tags: [prompt, prerequisite]

    - tag: output
      group: asset
      meaning: 输出格式控制
      when_to_apply: |
        - 需要特定输出格式时
        - 格式化输出结果
      when_not_to_apply: |
        - 自由格式输出
        - 简单回答
      related_tags: [format, formatting]

    - tag: meta
      group: asset
      meaning: Prompt 工程元级工具
      when_to_apply: |
        - Prompt 优化、调试、评估时
        - Prompt 本身需要改进时
      when_not_to_apply: |
        - 执行实际任务时
        - Prompt 已经工作良好
      related_tags: [prompt, optimization]

    - tag: routing
      group: asset
      meaning: 路由和选择机制
      when_to_apply: |
        - 需要判断任务类型时
        - 需要选择合适资源时
        - 仓库初始化扫描
      when_not_to_apply: |
        - 任务类型已确定
        - 只需要执行特定 prompt
      related_tags: [prompt, skill, selection]

  # ==================== EXECUTION TAGS ====================
  execution:
    - tag: multi-step
      group: execution
      meaning: 多步骤执行
      when_to_apply: |
        - 任务需要多个步骤时
        - 步骤之间有依赖关系时
        - 需要阶段性验证时
      when_not_to_apply: |
        - 单步骤任务
        - 简单问答
      related_tags: [workflow, sequential]

    - tag: sequential
      group: execution
      meaning: 顺序执行
      when_to_apply: |
        - 步骤必须按顺序执行
        - 前一步输出影响后一步
      when_not_to_apply: |
        - 步骤可以并行
        - 无依赖关系
      related_tags: [multi-step, step-by-step]

    - tag: iterative
      group: execution
      meaning: 迭代执行
      when_to_apply: |
        - 需要反复验证和调整时
        - 迭代改进的场景
      when_not_to_apply: |
        - 一次性任务
        - 无需反馈循环
      related_tags: [multi-step, verification]

    - tag: verification
      group: execution
      meaning: 验证环节
      when_to_apply: |
        - 需要确认结果正确时
        - 修复后验证
        - 质量检查
      when_not_to_apply: |
        - 无需验证的简单任务
        - 纯生成任务
      related_tags: [verification, testing]

    - tag: prerequisite
      group: execution
      meaning: 前置条件检查
      when_to_apply: |
        - 行动前需要准备时
        - 需要先了解上下文时
        - 工具使用前检查
      when_not_to_apply: |
        - 无前置条件
        - 直接执行
      related_tags: [tool-use, preparation]

  # ==================== OUTPUT TAGS ====================
  output:
    - tag: markdown
      group: output
      meaning: Markdown 格式输出
      when_to_apply: |
        - 需要生成文档时
        - 人类可读的报告
        - 结构化文本
      when_not_to_apply: |
        - 需要机器可读格式
        - 需要结构化数据
      related_tags: [document, report]

    - tag: json
      group: output
      meaning: JSON 格式输出
      when_to_apply: |
        - 需要结构化数据时
        - API 响应
        - 数据交换格式
      when_not_to_apply: |
        - 只需要人类可读文档
        - 配置类内容
      related_tags: [structured-data, api]

    - tag: yaml
      group: output
      meaning: YAML 格式输出
      when_to_apply: |
        - 配置文件
        - 人类可读的配置
        - 数据序列化
      when_not_to_apply: |
        - 需要结构化数据
        - 只需要报告
      related_tags: [config, structured-data]

    - tag: table
      group: output
      meaning: 表格格式输出
      when_to_apply: |
        - 对比多个选项
        - 展示并列数据
      when_not_to_apply: |
        - 简单列表
        - 层次结构
      related_tags: [comparison, structured]

    - tag: checklist
      group: output
      meaning: 检查清单格式
      when_to_apply: |
        - 任务分解
        - 验证清单
        - 待办事项
      when_not_to_apply: |
        - 需要详细说明
        - 只需简单列表
      related_tags: [todo, task-decomposition]

    - tag: report
      group: output
      meaning: 报告类输出
      when_to_apply: |
        - 分析结果呈现
        - 研究总结
        - 项目报告
      when_not_to_apply: |
        - 简单回答
        - 代码片段
      related_tags: [markdown, document]

    - tag: structured-data
      group: output
      meaning: 结构化数据
      when_to_apply: |
        - 需要程序处理
        - API 数据格式
      when_not_to_apply: |
        - 只需要人类可读
      related_tags: [json, yaml]

  # ==================== QUALITY TAGS ====================
  quality:
    - tag: optimization
      group: quality
      meaning: 优化相关
      when_to_apply: |
        - 性能优化
        - 代码优化
        - Prompt 压缩
      when_not_to_apply: |
        - 功能实现
        - 新代码生成
      related_tags: [performance, efficiency]

    - tag: review
      group: quality
      meaning: 审查相关
      when_to_apply: |
        - 代码审查
        - 质量评估
        - 代码质量检查
      when_not_to_apply: |
        - 新代码生成
        - 问题修复
      related_tags: [quality, verification]

    - tag: safe
      group: quality
      meaning: 安全相关
      when_to_apply: |
        - 涉及修改的修复
        - 需要确保安全的操作
        - 风险评估
      when_not_to_apply: |
        - 纯生成任务
        - 只读操作
      related_tags: [verification, risk-assessment]

  # ==================== GENERAL TAGS ====================
  general:
    - tag: style
      group: general
      meaning: 风格相关
      when_to_apply: |
        - 风格检测和适配
        - 语气调整
        - 表达方式个性化
      when_not_to_apply: |
        - 纯技术任务
        - 不需要风格考量时
      related_tags: [communication, adaptation]

    - tag: adaptation
      group: general
      meaning: 适配相关
      when_to_apply: |
        - 用户风格适配
        - 教学风格调整
        - 响应格式调整
      when_not_to_apply: |
        - 固定格式要求
        - 不需要适配的场景
      related_tags: [style, personalization]

    - tag: personalization
      group: general
      meaning: 个性化相关
      when_to_apply: |
        - 用户偏好学习
        - 个性化响应
        - 长期记忆用户偏好
      when_not_to_apply: |
        - 通用场景
        - 标准化输出
      related_tags: [style, adaptation]

    - tag: long-term
      group: general
      meaning: 长期协作相关
      when_to_apply: |
        - 长期项目
        - 多会话任务
        - 目标追踪
      when_not_to_apply: |
        - 短期一次性任务
        - 单会话场景
      related_tags: [continuity, collaboration]

    - tag: continuity
      group: general
      meaning: 连续性相关
      when_to_apply: |
        - 会话恢复
        - 上下文维护
        - 项目连续性
      when_not_to_apply: |
        - 每次独立任务
        - 无需记忆的场景
      related_tags: [long-term, memory]

    - tag: collaboration
      group: general
      meaning: 协作相关
      when_to_apply: |
        - 需要与用户长期合作
        - 协作者角色扮演
        - 多轮交互
      when_not_to_apply: |
        - 纯查询任务
        - 独立单次任务
      related_tags: [long-term, continuity]

    - tag: memory
      group: general
      meaning: 记忆相关
      when_to_apply: |
        - 上下文记忆
        - 用户偏好记录
        - 工作记忆管理
      when_not_to_apply: |
        - 每次独立请求
        - 不需要上下文的场景
      related_tags: [continuity, context]

    - tag: context
      group: general
      meaning: 上下文相关
      when_to_apply: |
        - 上下文理解
        - 上下文维护
        - 上下文恢复
      when_not_to_apply: |
        - 简单查询
        - 不需要上下文的场景
      related_tags: [memory, continuity]

  # ==================== PERSONAL TAGS ====================
  personal:
    - tag: daily
      group: personal
      meaning: 日常生活相关
      when_to_apply: |
        - 日常任务
        - 生活问题
        - 作息规划
      when_not_to_apply: |
        - 专业任务
        - 技术问题
      related_tags: [assistant, routine]

    - tag: assistant
      group: personal
      meaning: 助手相关
      when_to_apply: |
        - 日常生活助手
        - 轻量任务支持
        - 日常对话
      when_not_to_apply: |
        - 专业领域
        - 编程任务
      related_tags: [daily, conversation]

    - tag: routine
      group: personal
      meaning: 作息习惯相关
      when_to_apply: |
        - 作息调整
        - 习惯养成
        - 日常追踪
      when_not_to_apply: |
        - 一次性任务
        - 无习惯相关
      related_tags: [daily, habit]

    - tag: habit
      group: personal
      meaning: 习惯相关
      when_to_apply: |
        - 习惯养成
        - 行为追踪
        - 作息管理
      when_not_to_apply: |
        - 临时任务
        - 无习惯相关
      related_tags: [routine, daily]

    - tag: organization
      group: personal
      meaning: 组织整理相关
      when_to_apply: |
        - 任务整理
        - 思绪整理
        - 信息结构化
      when_not_to_apply: |
        - 已是结构化内容
        - 不需要整理时
      related_tags: [planning, notes]

    - tag: notes
      group: personal
      meaning: 笔记相关
      when_to_apply: |
        - 笔记整理
        - 思绪转笔记
        - 学习笔记
      when_not_to_apply: |
        - 不需要记录
        - 纯对话场景
      related_tags: [organization, learning]

    - tag: conversation
      group: personal
      meaning: 对话相关
      when_to_apply: |
        - 日常聊天
        - 轻量对话
        - 情感支持
      when_not_to_apply: |
        - 正式任务
        - 专业咨询
      related_tags: [assistant, casual]

    - tag: casual
      group: personal
      meaning: 轻松随意相关
      when_to_apply: |
        - 轻松对话
        - 娱乐聊天
        - 角色扮演
      when_not_to_apply: |
        - 正式场景
        - 任务导向
      related_tags: [conversation, creative]

  # ==================== REFLECTION TAGS ====================
  reflection:
    - tag: reflection
      group: reflection
      meaning: 反思复盘相关
      when_to_apply: |
        - 每日复盘
        - 经验总结
        - 自我评估
      when_not_to_apply: |
        - 纯任务执行
        - 不需要反思时
      related_tags: [learning, evaluation]

    - tag: review
      group: reflection
      meaning: 回顾相关
      when_to_apply: |
        - 经历回顾
        - 进度回顾
        - 定期复盘
      when_not_to_apply: |
        - 正在进行中
        - 纯前瞻任务
      related_tags: [reflection, evaluation]

    - tag: evaluation
      group: reflection
      meaning: 评估相关
      when_to_apply: |
        - 自我评估
        - 效果评估
        - 平衡总结
      when_not_to_apply: |
        - 纯执行任务
        - 不需要评估
      related_tags: [review, reflection]

    - tag: learning
      group: reflection
      meaning: 学习相关
      when_to_apply: |
        - 从经验学习
        - 教训提取
        - 知识积累
      when_not_to_apply: |
        - 纯执行任务
        - 不需要学习
      related_tags: [reflection, action]

    - tag: action
      group: reflection
      meaning: 行动相关
      when_to_apply: |
        - 制定行动计划
        - 下一步确定
        - 改进措施
      when_not_to_apply: |
        - 纯反思
        - 不需要行动
      related_tags: [learning, improvement]

    - tag: improvement
      group: reflection
      meaning: 改进相关
      when_to_apply: |
        - 持续改进
        - 计划优化
        - 习惯改进
      when_not_to_apply: |
        - 满意现状
        - 无需改进
      related_tags: [action, planning]

    - tag: balance
      group: reflection
      meaning: 平衡相关
      when_to_apply: |
        - 工作生活平衡
        - 优缺点总结
        - 建设性评估
      when_not_to_apply: |
        - 极端情况
        - 不需要平衡视角
      related_tags: [evaluation, reflection]

  # ==================== LEARNING TAGS ====================
  learning:
    - tag: teaching
      group: learning
      meaning: 教学相关
      when_to_apply: |
        - 解释概念
        - 因材施教
        - 教学设计
      when_not_to_apply: |
        - 纯执行任务
        - 不需要教学
      related_tags: [explanation, adaptation]

    - tag: explanation
      group: learning
      meaning: 解释说明相关
      when_to_apply: |
        - 概念解释
        - 分步说明
        - 复杂主题讲解
      when_not_to_apply: |
        - 简单查询
        - 不需要解释
      related_tags: [teaching, understanding]

    - tag: understanding
      group: learning
      meaning: 理解相关
      when_to_apply: |
        - 检查理解
        - 深化理解
        - 知识缺口识别
      when_not_to_apply: |
        - 纯记忆任务
        - 不需要理解验证
      related_tags: [explanation, quiz]

    - tag: quiz
      group: learning
      meaning: 测验相关
      when_to_apply: |
        - 检查学习效果
        - 巩固知识
        - 验证理解
      when_not_to_apply: |
        - 学习刚开始
        - 不需要测验
      related_tags: [understanding, assessment]

    - tag: assessment
      group: learning
      meaning: 评估相关
      when_to_apply: |
        - 学习水平评估
        - 知识缺口诊断
        - 学习效果评估
      when_not_to_apply: |
        - 纯学习过程
        - 不需要评估
      related_tags: [quiz, gaps]

    - tag: gaps
      group: learning
      meaning: 知识缺口相关
      when_to_apply: |
        - 识别薄弱环节
        - 针对性补充
        - 知识诊断
      when_not_to_apply: |
        - 新学习开始
        - 水平评估已完成
      related_tags: [assessment, diagnosis]

    - tag: diagnosis
      group: learning
      meaning: 诊断相关
      when_to_apply: |
        - 问题诊断
        - 原因分析
        - 知识缺口识别
      when_not_to_apply: |
        - 明显问题
        - 不需要诊断
      related_tags: [gaps, analysis]

    - tag: plan
      group: learning
      meaning: 学习计划相关
      when_to_apply: |
        - 制定学习计划
        - 学习路径规划
        - 里程碑设置
      when_not_to_apply: |
        - 简单学习
        - 临时学习
      related_tags: [structure, milestone]

    - tag: structure
      group: learning
      meaning: 结构化相关
      when_to_apply: |
        - 学习内容结构化
        - 笔记整理
        - 知识体系化
      when_not_to_apply: |
        - 零散知识点
        - 不需要结构
      related_tags: [plan, notes]

    - tag: milestone
      group: learning
      meaning: 里程碑相关
      when_to_apply: |
        - 学习阶段划分
        - 进度追踪
        - 目标达成
